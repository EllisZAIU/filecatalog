version: '3.8'

services:
  filecatalog:
    build: .
    container_name: filecatalog
    restart: unless-stopped
    ports:
      - "3030:3030"
    environment:
      DB_HOST: ${DB_HOST:-your-nas-ip}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-catalog}
      DB_PASS: ${DB_PASS:-changeme}
      DB_NAME: ${DB_NAME:-filecatalog}
      PORT: 3030
